<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Burger King | Home of Tasty Burgers</title>

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===========================HEADER============================ -->

    <header class="header">

        <div class="container">

            <nav class="navbar">

                <!-- Logo -->

                <a href="#" class="logo">
                    Port<span>folio</span>
                </a>

                <!-- Navigation -->

                <ul class="nav-menu">

                    <li class="nav-item">
                        <a href="#" class="nav-link active">Home</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">About</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Blog</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Services</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Contact</a>
                    </li>

                </ul>

                <!-- CTA Button -->

                <a href="#" class="btn">
                    Book Now
                </a>

                <!-- Mobile Menu Button -->

                <button
                    class="hamburger"
                    aria-label="Toggle Navigation">

                    <i class='bx bx-menu' id="menu-icon"></i>

                </button>

            </nav>

        </div>

    </header>



    <!-- ===========================
         MAIN
    ============================ -->

    <main>

        <!-- Hero Section -->

        <section class="hero">

            <div class="container">

                <div class="hero-content">

                    <!-- Hero Text -->

                    <div class="hero-text">

                        <p class="hero-subtitle">
                            Burger King
                        </p>

                        <h1 class="hero-title">
                            Home of
                            <span>Tasty Burgers</span>
                        </h1>

                        <p class="hero-description">
                            Experience freshly grilled burgers, crispy fries,
                            and unforgettable flavours made just for you.
                        </p>

                        <div class="hero-buttons">

                            <a href="#" class="btn">
                                Order Now
                            </a>

                            <a href="#" class="btn btn-secondary">
                                View Menu
                            </a>

                        </div>

                    </div>

                    <!-- Hero Image -->

                    <div class="hero-image">

                        <img
                            src="header.png"
                            alt="Delicious grilled cheeseburger">

                    </div>

                </div>

            </div>

        </section>

    </main>



    <!-- ===========================
         JAVASCRIPT
    ============================ -->

    <script src="script.js"></script>

</body>

</html>
